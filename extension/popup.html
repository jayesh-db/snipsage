<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SnipSage</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <span class="logo-icon">✨</span>
        <span class="logo-text">SnipSage</span>
      </div>
      <button id="logoutBtn" class="btn-icon" title="Logout" style="display:none;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <polyline points="16 17 21 12 16 7" />
          <line x1="21" y1="12" x2="9" y2="12" />
        </svg>
      </button>
    </header>

    <!-- Auth Section -->
    <div id="authSection">
      <!-- Tab Switcher -->
      <div class="tab-switcher">
        <button class="tab active" data-tab="login">Sign In</button>
        <button class="tab" data-tab="signup">Sign Up</button>
      </div>

      <!-- Login Form -->
      <form id="loginForm" class="form">
        <div class="input-group">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" placeholder="you@example.com" required>
        </div>
        <div class="input-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn-primary" id="loginBtn">
          <span class="btn-text">Sign In</span>
          <span class="btn-loader" style="display:none;"></span>
        </button>
      </form>

      <!-- Signup Form -->
      <form id="signupForm" class="form" style="display:none;">
        <div class="input-group">
          <label for="signupName">Name</label>
          <input type="text" id="signupName" placeholder="Your name" required>
        </div>
        <div class="input-group">
          <label for="signupEmail">Email</label>
          <input type="email" id="signupEmail" placeholder="you@example.com" required>
        </div>
        <div class="input-group">
          <label for="signupPassword">Password</label>
          <input type="password" id="signupPassword" placeholder="Min 6 characters" required minlength="6">
        </div>
        <button type="submit" class="btn-primary" id="signupBtn">
          <span class="btn-text">Create Account</span>
          <span class="btn-loader" style="display:none;"></span>
        </button>
      </form>
    </div>

    <!-- Capture Section (shown when logged in) -->
    <div id="captureSection" style="display:none;">
      <div class="user-greeting">
        <span class="greeting-emoji">👋</span>
        <span>Hello, <strong id="userName"></strong></span>
      </div>

      <!-- Selection Preview -->
      <div id="selectionPreview" class="selection-preview" style="display:none;">
        <div class="preview-label">Selected Text</div>
        <div id="selectedText" class="preview-content"></div>
        <div id="selectedSource" class="preview-source"></div>
      </div>

      <!-- Manual Capture -->
      <div class="capture-area">
        <textarea id="manualText"
          placeholder="Select text on any page and right-click → 'Save to SnipSage', or paste text here..."
          rows="4"></textarea>
        <div class="capture-meta">
          <input type="text" id="manualUrl" placeholder="Source URL (auto-filled)" readonly>
          <input type="text" id="manualTitle" placeholder="Page title (auto-filled)" readonly>
        </div>
      </div>

      <button id="saveBtn" class="btn-primary btn-save">
        <span class="btn-text">✂️ Save Selection</span>
        <span class="btn-loader" style="display:none;"></span>
      </button>

      <!-- <button id="saveFullPageBtn" class="btn-primary btn-full-page">
        <span class="btn-text">📄 Save Full Page</span>
        <span class="btn-loader" style="display:none;"></span>
      </button> -->

      <a href="http://localhost:3000" target="_blank" class="dashboard-link">
        📊 Open Dashboard
      </a>
    </div>

    <!-- Status Messages -->
    <div id="statusMessage" class="status-message" style="display:none;"></div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
